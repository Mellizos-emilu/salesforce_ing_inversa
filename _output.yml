bookdown::gitbook:
  css: 
    - style.css
    - include/webex.css
  includes:
    after_body: include/webex.js
  config:
    toc:
      before: |
        <li><a href="./">Salesforce|Studio</a></li>
      after: |
        <li><a href="https://github.com/rstudio/bookdown" target="blank">Published with bookdown</a></li>
    edit: https://github.com/USERNAME/REPO/edit/BRANCH/%s
    download:
    - pdf
    - epub
bookdown::pdf_book:
  includes:
    in_header: preamble.tex
  latex_engine: xelatex
  citation_package: natbib
  keep_tex: yes
bookdown::epub_book: default
bookdown::bs4_book:
  df_print: kable
  theme:
    primary: '#0d6efd'
  lib_dir: libs
  split_bib: no
  css: include/webex.css
  includes:
    after_body: include/webex.js
  md_extensions: -smart
